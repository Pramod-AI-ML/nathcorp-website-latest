name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3

      # Install dependencies (fix your npm error)
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Build Next.js (export static)
      - name: Build app
        run: npm run build

      # Deploy
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WITTY_FOREST_072AA3100 }}
          action: "upload"
          app_location: "/"
          api_location: "api"         # ✅ FIXED
          output_location: "out"      # ✅ FIXED
